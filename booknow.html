<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="booknow.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <h2>CINEMAS</h2>
            <ul class="navitems">
                <a href="homepage.html">Home</a>
                <a href="login.html">Login</a>
            </ul>
        </nav>
    </header>
    <div class="main-title">
        <search class="search-bar">
            <input class="search-item" type="search" placeholder="Search date">
            <input class="search-item" type="search" placeholder="Search city">
            <input class="search-item" type="search" placeholder="Search theatre">
        </search>
    </div>
    <div class="show-detail">
        <div class="show-info">
            <h3>Theatres</h3>
            <div class="theatre">
                <input type="radio" id="Sathyam cinemas" name="theatre" value="Sathyam cinemas">
                <label class="theatre-radio" for="Sathyam cinemas">Sathyam Cinemas</label>
                <input type="radio" id="Sri sakthi cinemas" name="theatre" value="Sri sakthi cinemas">
                <label class="theatre-radio" for="Sri sakthi cinemas">Sri sakthi Cinemas</label>
                <input type="radio" id="KG cinemas" name="theatre" value="KG cinemas">
                <label class="theatre-radio" for="KG cinemas">KG Cinemas</label>
            </div>
            <h3>Show Timing</h3>
            <button>Proceed</button>

        </div>
        <div class="show-image">
            <div class="movie-card">
                <img class="movie-image" src="https://m.media-amazon.com/images/I/81y0foYjoFL._AC_UF1000,1000_QL80_.jpg"
                    alt="movie2">
                <div class="movie-description">
                    <h3 class="movie-title">Spider-Man</h3>
                    <p class="movie-genre">Science-Fiction</p>
                    <p class="movie-language">English</p>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
