<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/booknow.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <h2>CINEMAS</h2>
            <ul class="navitems">
                <a href="homepage.html">Home</a>
                <a id="login" href="login.html">Login</a>
            </ul>
        </nav>
    </header>
    <div class="main-title">
        <h1>Select theatre,date and time</h1>
    </div>
    <div class="show-detail">
        <div class="show-info">
            <h3>Theatres</h3>
            <div class="theatre"></div>
            <h3>Day</h3>
            <div class="date"></div>
            <div class="show-time"></div>
            <div class="btn">
                <button class="btn-proceed">Proceed</button>
            </div>
        </div>
        <div class="show-image">
            <div class="movie-card">
                <img class="movie-image" src="">
                <div class="movie-description">
                    <h3 class="movie-title"></h3>
                    <p class="movie-genre"></p>
                    <p class="movie-language"></p>
                </div>
            </div>

        </div>
    </div>
    <script defer src="scripts/auth.js"></script>
    <script async src="scripts/booknow.js"></script>
</body>
</html>
