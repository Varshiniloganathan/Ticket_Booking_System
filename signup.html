<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>signup</title>
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/login.css">
    <script async src="scripts/signup.js"></script>
</head>
<body>
    <div class="login">
        <h2 class="head"> Create your account</h2>
        <form method="POST" class="form-container">
            <section>
                <div>
                    <label class="form-label" for="fname">First Name</label>
                    <input class="form-input" type="text" id="fname" name="firstname" placeholder="Enter first name" required>
                </div>
                <div>
                    <label class="form-label" for="mname">Middle Name</label>
                    <input class="form-input" type="text" id="mname" name="middlename" placeholder="Enter middle name">
                </div>
                <div>
                    <label class="form-label" for="lname">Last Name</label>
                    <input class="form-input" type="text" id="lname" name="lastname" placeholder="Enter last name" required>
                </div>
                <div>
                    <label class="form-label" for="email">Email</label>
                    <input class="form-input" type="email" id="email" name="email" placeholder="Enter email" required>
                </div>
                <div>
                    <label class="form-label" for="pwd">Password</label>
                    <input class="form-input" type="password" id="pwd" name="pwd" placeholder="Enter password" required>   
                </div>
                <div>
                    <label class="form-label" for="confirmpwd">Confirm Password</label>
                    <input class="form-input" type="password" id="confirmpwd" name="confirmpwd" placeholder="Re-enter password" required>
                </div>
                <p id="error"></p> 
            </section>
            <section>
                <button type="submit">Create account</button>
                <p>Already have an account?<a href="login.html">login</a></p>
            </section>
        </form>
    </div>
</body>
</html>
