<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/login.css">
    <script async src="scripts/signup.js"></script>
</head>

<body>
    <div class="login">
        <h2 style="text-align: center;"> Create your account</h2>
        <form method="POST" class="form-container">
            <section>
                <div>
                    <label class="form-label" for="fname">First Name</label>
                    <input class="form-input" type="text" id="fname" name="firstname" placeholder="Enter first name"
                        required>
                </div>
                <div>
                    <label class="form-label" for="mname">Middle Name</label>
                    <input class="form-input" type="text" id="mname" name="middlename">
                </div>
                <div>
                    <label class="form-label" for="lname">Last Name</label>
                    <input class="form-input" type="text" id="lname" name="lastname" placeholder="Enter last name"
                        required>
                </div>
                <div>
                    <label class="form-label" for="email">Email</label>
                    <input class="form-input" type="email" id="email" name="email" placeholder="Enter email" required>
                </div>
                <div>
                    <label class="form-label" for="pwd">Password</label>
                    <input class="form-input" type="password" id="pwd" name="pwd" required>
                    
                </div>
                <div>
                    <label class="form-label" for="confirmpwd">Confirm Password</label>
                    <input class="form-input" type="password" id="confirmpwd" name="confirmpwd" required>

                </div>
                <p id="error" style="color: red;"></p> 

            </section>

            <section>
                <button type="submit">Create account</button>
                <p style="align-content: center;">Already have an account?<a href="login.html">login</a></p>

            </section>

        </form>
    </div>




</body>

</html>
